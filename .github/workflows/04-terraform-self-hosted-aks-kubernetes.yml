name: 04-terraform-self-hosted-AKS-kubernetes.yml

on:
  push:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/azure/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose what to run'
        required: true
        default: 'plan'
        type: choice
        options: [ plan, apply, destroy ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    # 👇 land the job on your AKS runner
    runs-on: [self-hosted, aks]

    # 👇 same container you used before (keeps behaviour identical)
    container:
      image: ubuntu:22.04

    defaults:
      run:
        working-directory: ./Linux-Virtual-machine/azure

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      # 👇 same install block that worked for you on Minikube
      - name: Install Azure CLI + git + tar
        shell: bash
        working-directory: /
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y ca-certificates curl apt-transport-https lsb-release gnupg git tar unzip
          curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          az version
          # Node optional; keep if any action needs it
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Prepare SSH public key file
        run: |
          mkdir -p .ssh
          echo "${SSH_PUBLIC_KEY}" > .ssh/azure_vm_rsa.pub
          chmod 600 .ssh/azure_vm_rsa.pub
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform Fmt
        run: terraform fmt -recursive .

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' || github.event_name != 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.plan

      - name: Terraform Plan for Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.apply

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.apply

      - name: Terraform Plan for Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -destroy -out=tfplan.destroy

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.destroy
