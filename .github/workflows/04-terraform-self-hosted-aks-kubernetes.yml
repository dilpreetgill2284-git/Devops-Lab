name: 04-terraform-self-hosted-AKS-kubernetes.yml

on:
  push:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/azure/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose what to run'
        required: true
        default: 'plan'
        type: choice
        options: [ plan, apply, destroy ]

permissions:
  id-token: write   # OIDC to Azure
  contents: read

jobs:
  terraform:
    # 🔁 Point to ARC runner labels you actually have
    runs-on: [self-hosted, aks]

    # ❌ Not needed: ARC runner already provides a Linux env
    # container: ubuntu:22.04

    # ✔ Keep your Terraform working dir in the repo
    defaults:
      run:
        working-directory: ./Linux-Virtual-machine/azure

    # OIDC env for the Azurerm provider
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      # 1) Always checkout first (this creates the repo folder on the runner)
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Log in to Azure via OIDC (no client secret)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 3) Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      # 4) SSH public key for VM module (if your TF expects it)
      - name: Prepare SSH public key file
        run: |
          mkdir -p .ssh
          echo "${SSH_PUBLIC_KEY}" > .ssh/azure_vm_rsa.pub
          chmod 600 .ssh/azure_vm_rsa.pub
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      # 5) Usual TF steps in your azure folder
      - name: Terraform Fmt (auto-fix)
        run: terraform fmt -recursive .

      - name: Terraform Init (remote/local backend per your code)
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' || github.event_name != 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.plan

      - name: Terraform Plan for Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.apply

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.apply

      - name: Terraform Plan for Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -destroy -out=tfplan.destroy

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.destroy
