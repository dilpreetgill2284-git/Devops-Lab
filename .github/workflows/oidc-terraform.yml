name: Terraform CI for Linux-Virtual-machine (Plan + Manual Apply/Destroy)

on:
  push:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose what to run'
        required: true
        default: 'plan'
        type: choice
        options: [ plan, apply, destroy ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: [self-hosted, linux, minikube]

    # Run steps inside an Azure CLI container so `az` is available
    container:
      image: mcr.microsoft.com/azure-cli:latest

    # Keep your default working dir for Terraform steps
    defaults:
      run:
        working-directory: ./Linux-Virtual-machine

    # OIDC env for azurerm
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      # ✅ Run from '/' because repo folder doesn't exist yet (checkout hasn't run)
      - name: Install git and tar in the job container
        working-directory: /      # ← the one-line fix
        run: |
          tdnf makecache -q || true
          tdnf install -y git tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check Azure CLI
        run: az version

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Prepare SSH public key file
        run: |
          mkdir -p .ssh
          echo "${SSH_PUBLIC_KEY}" > .ssh/azure_vm_rsa.pub
          chmod 600 .ssh/azure_vm_rsa.pub
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform Fmt (auto-fix)
        run: terraform fmt -recursive .

      - name: Terraform Init (remote backend)
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' || github.event_name != 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.plan

      - name: Terraform Plan for Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.apply

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.apply

      - name: Terraform Plan for Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -destroy -out=tfplan.destroy

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.destroy
