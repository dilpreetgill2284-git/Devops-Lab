name: Terraform-github-runner-no-oidc.yml

on:
  push:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose what to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Run all commands from inside your project folder
    defaults:
      run:
        working-directory: ./Linux-Virtual-machine

    # CI env + SSH path override + Azure auth for provider
    env:
      TF_IN_AUTOMATION: "true"
      # Fallback path the runner creates for your public key
      TF_VAR_ssh_public_key_path: "./.ssh/azure_vm_rsa.pub"

      # azurerm provider auth (your Service Principal)
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      # Create the PUBLIC key file the Terraform file() fallback reads
      - name: Prepare SSH public key file
        run: |
          mkdir -p .ssh
          echo "${SSH_PUBLIC_KEY}" > .ssh/azure_vm_rsa.pub
          chmod 600 .ssh/azure_vm_rsa.pub
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      # ---------- CI: Always run fmt/init/validate ----------
      - name: Terraform Fmt (auto-fix)
        run: terraform fmt -recursive .

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # ---------- Mode selection ----------
      # PLAN (default or when action == 'plan')
      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' || github.event_name != 'workflow_dispatch' }}
        run: terraform plan -input=false -lock=false -var="ssh_public_key_path=./.ssh/azure_vm_rsa.pub"

      # APPLY (manual only)
      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply -auto-approve -var="ssh_public_key_path=./.ssh/azure_vm_rsa.pub"

      # DESTROY (manual only)
      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform destroy -auto-approve -var="ssh_public_key_path=./.ssh/azure_vm_rsa.pub"
