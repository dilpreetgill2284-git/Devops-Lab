name: Terraform CI for Linux-Virtual-machine (Plan + Manual Apply/Destroy)

on:
  push:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Linux-Virtual-machine/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose what to run'
        required: true
        default: 'plan'
        type: choice
        options: [ plan, apply, destroy ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Linux-Virtual-machine

    env:
      TF_IN_AUTOMATION: "true"

      # Azure auth (Service Principal)
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}

      # vm.tf fallback path
      TF_VAR_ssh_public_key_path: "./.ssh/azure_vm_rsa.pub"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Prepare SSH public key file
        run: |
          mkdir -p .ssh
          echo "${SSH_PUBLIC_KEY}" > .ssh/azure_vm_rsa.pub
          chmod 600 .ssh/azure_vm_rsa.pub
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform Fmt (auto-fix)
        run: terraform fmt -recursive .

      # Backend + provider init (uses backend.tf from the project)
      - name: Terraform Init (remote backend)
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # -------- PLAN (default on push/PR or manual action=plan) --------
      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' || github.event_name != 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.plan

      # -------- APPLY (manual only, no -auto-approve by using plan file) --------
      - name: Terraform Plan for Apply (manual only)
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -out=tfplan.apply

      - name: Terraform Apply (manual only, no auto-approve, applies saved plan)
        if: ${{ inputs.action == 'apply' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.apply

      # -------- DESTROY (manual only, no -auto-approve by using plan file) --------
      - name: Terraform Plan for Destroy (manual only)
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform plan -destroy -out=tfplan.destroy

      - name: Terraform Destroy (manual only, applies saved destroy plan)
        if: ${{ inputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform apply tfplan.destroy
